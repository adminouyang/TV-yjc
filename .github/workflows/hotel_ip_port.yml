name: hotel IP and Port

on:
  schedule:
    # 每天凌晨3点自动运行（UTC时间，北京时间+8）
    - cron: '0 19 * * *'
  # push:
  #   # 当脚本文件有更新时触发
  #   paths:
  #     - 'hotel_ip_port.yml'
  # pull_request:
  #   paths:
  #     - 'hotel_ip_port.yml'
  # 支持手动触发
  workflow_dispatch:

jobs:
  hotel-ip:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
        pip install pysocks
        
    - name: 提取ip_port
      run: |
        cat > hotel_ip_port.py << 'EOF'
        import requests
        import re
        import os
        import random
        import time
        import json
        import socket
        from urllib.parse import urlparse, urljoin
        from concurrent.futures import ThreadPoolExecutor, as_completed
        
        # 请求头设置
        HEADERS = {
            'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
            'Accept': '*/*',
            'Accept-Language': 'zh-CN,zh;q=0.9,en;q=0.8',
            'Connection': 'keep-alive',
            'Accept-Encoding': 'gzip, deflate',
            'Range': 'bytes=0-',
        }
        
        def check_ip_availability(ip_port, timeout=3):
            """检测IP:端口是否可用"""
            try:
                # 尝试连接HTTP服务
                test_urls = [
                    f"http://{ip_port}/iptv/live/1000.json?key=txiptv",
                    f"http://{ip_port}/ZHGXTV/Public/json/live_interface.txt"
                ]
                
                for url in test_urls:
                    try:
                        response = requests.get(url, timeout=timeout, headers=HEADERS, verify=False)
                        if response.status_code == 200:
                            return True, url
                    except Exception as e:
                        continue
                        
                return False, None
            except Exception as e:
                return False, None
        
        def hotel_channels_from_ip_port(ip_port, interface_url):
            """
            从IP:端口的接口解析频道信息
            返回频道列表 [(频道名称, 频道URL), ...]
            """
            hotel_channels = []
            try:
                # 发送GET请求获取数据
                response = requests.get(interface_url, timeout=5, headers=HEADERS, verify=False)
                
                if "iptv" in interface_url:
                    # 处理JSON格式
                    try:
                        json_data = response.json()
                        
                        for item in json_data.get('data', []):
                            if isinstance(item, dict):
                                name = item.get('name', '')
                                urlx = item.get('url', '')
                                if name and urlx and ("tsfile" in urlx or "m3u8" in urlx or "hls" in urlx):
                                    # 确保urlx以斜杠开头,避免双斜杠
                                    if not urlx.startswith('/'):
                                        urlx = '/' + urlx
                                    urld = f"http://{ip_port}{urlx}"
                                    hotel_channels.append((name, urld))
                    except json.JSONDecodeError:
                        print(f"JSON解析错误: {interface_url}")
                        
                elif "ZHGXTV" in interface_url:
                    # 处理TXT格式
                    content = response.text
                    data_lines = content.split('\\n')
                    
                    for line in data_lines:
                        line = line.strip()
                        if not line or ',' not in line:
                            continue
                        
                        parts = line.split(',', 1)
                        if len(parts) < 2:
                            continue
                        
                        name = parts[0].strip()
                        full_url = parts[1].strip()
                        
                        # 解析完整URL，提取路径
                        parsed_url = urlparse(full_url)
                        path = parsed_url.path
                        if parsed_url.query:
                            path += '?' + parsed_url.query
                        
                        # 构建基于当前IP端口的URL
                        urld = f"http://{ip_port}{path}"
                        hotel_channels.append((name, urld))
                
                return hotel_channels
            except Exception as e:
                print(f"解析频道错误 {interface_url}: {e}")
                return []
        
        def get_chunk_size_from_m3u8(channel_url, timeout=5):
            """尝试从m3u8文件中获取chunk大小信息"""
            try:
                # 先获取m3u8文件内容
                response = requests.get(channel_url, timeout=timeout, headers=HEADERS, verify=False)
                if response.status_code != 200:
                    return None
                
                content = response.text
                lines = content.split('\\n')
                
                # 查找TS文件
                ts_files = [line for line in lines if line.endswith('.ts') and not line.startswith('#')]
                
                if ts_files:
                    # 尝试获取第一个TS文件的大小
                    base_url = channel_url.rsplit('/', 1)[0] if '/' in channel_url else channel_url
                    ts_url = urljoin(base_url + '/', ts_files[0]) if base_url else None
                    
                    if ts_url:
                        head_response = requests.head(ts_url, timeout=3, headers=HEADERS, verify=False)
                        if head_response.status_code == 200:
                            content_length = head_response.headers.get('Content-Length')
                            if content_length:
                                return int(content_length)
                
                return None
            except:
                return None
        
        def test_stream_speed(channel_url, timeout=10):
            """
            针对流媒体的智能测速
            1. 首先检查是否能够访问
            2. 尝试获取m3u8文件
            3. 如果有TS文件，测试TS文件的下载速度
            4. 如果没有TS文件，测试m3u8文件的下载速度
            """
            try:
                # 创建session
                session = requests.Session()
                
                # 方法1: 尝试直接访问频道URL
                try:
                    start_time = time.time()
                    response = session.head(channel_url, timeout=3, headers=HEADERS, verify=False, allow_redirects=True)
                    head_time = time.time() - start_time
                    
                    if response.status_code != 200:
                        # 尝试GET请求
                        start_time = time.time()
                        response = session.get(channel_url, timeout=5, headers=HEADERS, verify=False, stream=True)
                        if response.status_code == 200:
                            # 尝试读取一小段数据
                            content_length = 0
                            chunk_size = 4096
                            for chunk in response.iter_content(chunk_size=chunk_size):
                                if chunk:
                                    content_length += len(chunk)
                                    if content_length >= 8192:  # 读取8KB
                                        break
                            
                            if content_length > 0:
                                elapsed = time.time() - start_time
                                if elapsed > 0:
                                    speed = (content_length / 1024) / elapsed
                                    return speed
                except:
                    pass
                
                # 方法2: 如果是m3u8文件，尝试下载其中的TS片段
                if channel_url.endswith('.m3u8'):
                    try:
                        # 获取m3u8内容
                        response = session.get(channel_url, timeout=5, headers=HEADERS, verify=False)
                        if response.status_code == 200:
                            content = response.text
                            lines = content.split('\\n')
                            
                            # 查找TS文件
                            ts_lines = [line.strip() for line in lines if line.strip() and not line.startswith('#') and line.endswith('.ts')]
                            
                            if ts_lines:
                                # 取第一个TS文件
                                ts_file = ts_lines[0]
                                base_url = channel_url.rsplit('/', 1)[0] if '/' in channel_url else channel_url
                                ts_url = ts_file
                                
                                # 如果是相对路径，转换为绝对路径
                                if not ts_url.startswith('http'):
                                    if base_url:
                                        ts_url = urljoin(base_url + '/', ts_file)
                                    else:
                                        ts_url = channel_url.rsplit('/', 1)[0] + '/' + ts_file if '/' in channel_url else ts_file
                                
                                # 测试TS文件下载速度
                                try:
                                    start_time = time.time()
                                    response = session.get(ts_url, timeout=5, headers=HEADERS, verify=False, stream=True)
                                    
                                    if response.status_code == 200:
                                        downloaded = 0
                                        chunk_size = 8192
                                        target_size = 16384  # 下载16KB
                                        
                                        for chunk in response.iter_content(chunk_size=chunk_size):
                                            if chunk:
                                                downloaded += len(chunk)
                                                if downloaded >= target_size:
                                                    break
                                        
                                        elapsed = time.time() - start_time
                                        if elapsed > 0 and downloaded > 0:
                                            speed = (downloaded / 1024) / elapsed
                                            return speed
                                except:
                                    pass
                    except:
                        pass
                
                # 方法3: 简单测速 - 下载前32KB数据
                try:
                    start_time = time.time()
                    
                    # 设置Range头，只请求前32KB
                    speed_headers = HEADERS.copy()
                    speed_headers['Range'] = 'bytes=0-32767'
                    
                    response = session.get(channel_url, timeout=5, headers=speed_headers, verify=False, stream=True)
                    
                    if response.status_code in [200, 206]:  # 200 OK 或 206 Partial Content
                        downloaded = 0
                        target_size = 32768  # 32KB
                        
                        for chunk in response.iter_content(chunk_size=8192):
                            if chunk:
                                downloaded += len(chunk)
                                if downloaded >= target_size:
                                    break
                        
                        elapsed = time.time() - start_time
                        if elapsed > 0 and downloaded > 0:
                            speed = (downloaded / 1024) / elapsed
                            return speed
                except:
                    pass
                
                return 0
                
            except Exception as e:
                return 0
        
        def hotel_ip_port_from_urls(url_list):
            """
            从给定的URL列表中读取直播源文件，提取包含"tsfile"或"hls"的IP和端口
            然后检测IP端口有效性，解析频道，测速，最终保存有效的IP端口
            """
            ip_port_set = set()  # 使用集合自动去重
            
            print("步骤1: 从直播源URL提取IP和端口...")
            for url in url_list:
                try:
                    response = requests.get(url, timeout=10, headers=HEADERS, verify=False)
                    response.raise_for_status()
                    lines = response.text.splitlines()
                    
                    for line in lines:
                        line = line.strip()
                        if not line or line.startswith('#') or ',' not in line:
                            continue
                        
                        parts = line.split(',', 1)
                        if len(parts) < 2:
                            continue
                        
                        url_part = parts[1].strip()
                        if 'tsfile' in url_part or 'hls' in url_part or 'm3u8' in url_part:
                            # 尝试多种方式提取IP和端口
                            match = re.search(r'https?://([^:/]+):(\d+)', url_part)
                            if match:
                                ip = match.group(1)
                                port = match.group(2)
                                ip_port_set.add(f"{ip}:{port}")
                    
                    print(f"  从 {url} 提取完成")
                    
                except Exception as e:
                    print(f"处理URL {url} 时发生错误: {e}")
            
            print(f"共提取到 {len(ip_port_set)} 个IP:端口")
            
            # 转换为列表
            ip_port_list = list(ip_port_set)
            
            print(f"\\n步骤2: 检测IP端口有效性...")
            available_ips = []
            
            # 使用线程池并发检测
            with ThreadPoolExecutor(max_workers=20) as executor:
                future_to_ip = {executor.submit(check_ip_availability, ip_port): ip_port for ip_port in ip_port_list}
                
                for future in as_completed(future_to_ip):
                    ip_port = future_to_ip[future]
                    try:
                        is_available, interface_url = future.result()
                        if is_available:
                            available_ips.append((ip_port, interface_url))
                            print(f"  ✓ {ip_port} 可用 (接口: {interface_url})")
                        else:
                            print(f"  ✗ {ip_port} 不可用")
                    except Exception as e:
                        print(f"检测 {ip_port} 时出错: {e}")
            
            print(f"\\n共 {len(available_ips)} 个IP:端口可用")
            
            print(f"\\n步骤3: 从可用IP解析频道信息并测速...")
            speed_tested_ips = []
            
            for idx, (ip_port, interface_url) in enumerate(available_ips, 1):
                try:
                    print(f"  [{idx}/{len(available_ips)}] 处理 {ip_port}...")
                    
                    # 解析频道
                    channels = hotel_channels_from_ip_port(ip_port, interface_url)
                    
                    if not channels:
                        print(f"    {ip_port}: 无频道信息")
                        continue
                    
                    # 过滤包含"CCTV"的频道
                    cctv_channels = [(name, url) for name, url in channels if "CCTV" in name.upper()]
                    
                    if not cctv_channels:
                        print(f"    {ip_port}: 无CCTV频道")
                        continue
                    
                    print(f"    {ip_port}: 找到 {len(cctv_channels)} 个CCTV频道")
                    
                    # 尝试多个CCTV频道测速，取最高速度
                    best_speed = 0
                    tested_channels = 0
                    max_test_channels = min(2, len(cctv_channels))  # 最多测试2个频道
                    
                    # 随机选择几个频道进行测试
                    test_channels = random.sample(cctv_channels, max_test_channels) if len(cctv_channels) > 1 else cctv_channels
                    
                    for channel_name, channel_url in test_channels:
                        tested_channels += 1
                        print(f"    {ip_port}: 测试频道 [{channel_name}] ({tested_channels}/{max_test_channels})")
                        
                        # 测速
                        speed = test_stream_speed(channel_url)
                        
                        if speed > best_speed:
                            best_speed = speed
                        
                        print(f"    {ip_port}: 频道 [{channel_name}] 速度: {speed:.2f} KB/s")
                        
                        # 如果速度已经很高，可以提前结束
                        if speed > 1000:  # 1MB/s
                            break
                    
                    if best_speed > 10:  # 速度大于10KB/s (降低阈值)
                        speed_tested_ips.append((ip_port, best_speed))
                        print(f"    {ip_port}: 通过测速 (最佳速度: {best_speed:.2f} KB/s)")
                    else:
                        print(f"    {ip_port}: 测速失败 (最佳速度: {best_speed:.2f} KB/s)")
                        
                except Exception as e:
                    print(f"    {ip_port}: 处理失败 - {e}")
            
            # 按速度排序
            speed_tested_ips.sort(key=lambda x: x[1], reverse=True)
            
            print(f"\\n步骤4: 保存通过测速的IP端口...")
            
            # 保存到文件
            output_dir = "Hotel/ip"
            os.makedirs(output_dir, exist_ok=True)
            output_file = os.path.join(output_dir, "hotel_ip.txt")
            
            with open(output_file, 'w', encoding='utf-8') as f:
                for ip_port, speed in speed_tested_ips:
                    f.write(f"{ip_port}  # 速度: {speed:.2f} KB/s\\n")
            
            # 统计信息
            print(f"\\n" + "="*50)
            print(f"处理完成统计:")
            print(f"  - 初始提取IP端口: {len(ip_port_set)} 个")
            print(f"  - 可用IP端口: {len(available_ips)} 个")
            print(f"  - 通过测速IP端口: {len(speed_tested_ips)} 个")
            print(f"  - 结果已保存到: {output_file}")
            print("="*50)
            
            if speed_tested_ips:
                print(f"\\n通过测速的IP端口 (按速度排序):")
                for i, (ip_port, speed) in enumerate(speed_tested_ips[:20], 1):
                    print(f"  {i:2d}. {ip_port} - {speed:.2f} KB/s")
                if len(speed_tested_ips) > 20:
                    print(f"  ... 还有 {len(speed_tested_ips)-20} 个")
            else:
                print("\\n警告: 没有找到通过测速的IP端口")
        
        if __name__ == "__main__":
            # 禁用SSL警告
            import urllib3
            urllib3.disable_warnings(urllib3.exceptions.InsecureRequestWarning)
            
            # 示例URL列表
            urls = [
                "https://raw.githubusercontent.com/jn950/live/refs/heads/main/tv/holive.m3u",  # txt格式
                "https://raw.githubusercontent.com/whyun-pages/hotel-tvn/refs/heads/main/lives.txt",
                "https://raw.githubusercontent.com/mzky/checklist/refs/heads/master/itvlist.m3u",
                #"http://129.211.14.102:50085/sub?tv.sohu.blog=txt",
                #"https://raw.githubusercontent.com/kenye201/TVlog/refs/heads/main/final_hotel.txt",
            ]
            
            hotel_ip_port_from_urls(urls)
        EOF
        
        python hotel_ip_port.py
      
    - name: Commit and push if changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add Hotel/ip/hotel_ip.txt
        git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update: 自动更新 IP  $(date '+%Y-%m-%d %H:%M:%S')"
        git push

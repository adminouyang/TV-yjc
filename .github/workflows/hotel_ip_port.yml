name: hotel IP and Port

on:
  schedule:
    # 每隔3天下午3点自动运行（UTC时间，北京时间+8）
    - cron: '0 9 * * *'
  push:
    # 当脚本文件有更新时触发
    paths:
      - 'hotel__ip_port.yml'
  pull_request:
    paths:
      - 'hotel__ip_port.yml'
  # 支持手动触发
  workflow_dispatch:

jobs:
  hotel_-ip:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
        pip install pysocks
        pip install eventlet
        
    - name: 提取ip_port
      run: |
        cat > hotel__ip_port.py << 'EOF'
        import requests
        import re
        import os
        import random
        import time
        import json
        import socket
        import eventlet
        eventlet.monkey_patch()
        from urllib.parse import urlparse, urljoin
        from queue import Queue
        from threading import Thread
        from concurrent.futures import ThreadPoolExecutor, as_completed
        
        # 请求头设置
        HEADERS = {
            'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
            'Accept': '*/*',
            'Accept-Language': 'zh-CN,zh;q=0.9,en;q=0.8',
            'Connection': 'keep-alive',
            'Accept-Encoding': 'gzip, deflate',
        }
        
        def check_tcp_connection(ip, port, timeout=3):
            """测试TCP连接是否可用"""
            try:
                sock = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                sock.settimeout(timeout)
                result = sock.connect_ex((ip, int(port)))
                sock.close()
                return result == 0
            except:
                return False
        
        def check_ip_availability(ip_port, timeout=5):
            """检测IP:端口是否可用 - 简化版"""
            try:
                ip, port = ip_port.split(':')
                
                # 先测试TCP连接
                if not check_tcp_connection(ip, port, timeout=2):
                    return False, None
                
                # 只测试两个主要接口
                test_urls = [
                    f"http://{ip_port}/iptv/live/1000.json?key=txiptv",
                    f"http://{ip_port}/ZHGXTV/Public/json/live_interface.txt"
                ]
                
                session = requests.Session()
                
                for url in test_urls:
                    try:
                        response = session.get(url, timeout=3, headers=HEADERS, verify=False)
                        if response.status_code == 200:
                            return True, url
                    except:
                        continue
                
                return False, None
                
            except Exception as e:
                return False, None
        
        def hotel__channels_from_ip_port(ip_port, interface_url):
            """
            从IP:端口的接口解析频道信息
            返回频道列表 [(频道名称, 频道URL), ...]
            """
            hotel_channels = []
            try:
                # 发送GET请求获取数据
                response = requests.get(interface_url, timeout=10, headers=HEADERS, verify=False)
                
                # 根据接口类型处理
                if "iptv" in interface_url or "json" in interface_url:
                    # 处理JSON格式
                    try:
                        json_data = response.json()
                        
                        if isinstance(json_data, dict) and "data" in json_data:
                            for item in json_data["data"]:
                                if isinstance(item, dict):
                                    name = item.get('name', '')
                                    urlx = item.get('url', '')
                                    if name and urlx and ("tsfile" in urlx or "m3u8" in urlx or "hls" in urlx or ".ts" in urlx):
                                        if not urlx.startswith('/'):
                                            urlx = '/' + urlx
                                        urld = f"http://{ip_port}{urlx}"
                                        hotel_channels.append((name, urld))
                    except:
                        pass
                
                # 处理TXT格式
                content = response.text
                lines = content.split('\\n')
                
                for line in lines:
                    line = line.strip()
                    if not line or line.startswith('#') or ',' not in line:
                        continue
                    
                    parts = line.split(',', 1)
                    if len(parts) < 2:
                        continue
                    
                    name = parts[0].strip()
                    full_url = parts[1].strip()
                    
                    # 提取路径部分
                    parsed_url = urlparse(full_url)
                    path = parsed_url.path
                    if parsed_url.query:
                        path += '?' + parsed_url.query
                    
                    # 构建基于当前IP端口的URL
                    urld = f"http://{ip_port}{path}"
                    hotel_channels.append((name, urld))
                
                return hotel_channels
            except Exception as e:
                return []
        
        def test_m3u8_playlist(channel_url, timeout=10):
            """
            测试m3u8播放列表的速度
            返回速度(MB/s)
            """
            best_speed = 0.0
            max_attempts = 2
            
            for attempt in range(max_attempts):
                try:
                    # 获取m3u8文件内容
                    response = requests.get(channel_url, timeout=5, headers=HEADERS, verify=False)
                    if response.status_code != 200:
                        continue
                    
                    content = response.text
                    lines = content.strip().split('\\n')
                    
                    # 尝试查找TS文件或嵌套的m3u8
                    ts_files = []
                    m3u8_files = []
                    
                    for line in lines:
                        line = line.strip()
                        if line and not line.startswith('#'):
                            if line.endswith('.ts'):
                                ts_files.append(line)
                            elif '.m3u8' in line:
                                m3u8_files.append(line)
                    
                    # 优先使用TS文件测速
                    test_urls = []
                    
                    if ts_files:
                        # 构建TS文件的完整URL
                        base_url = channel_url[:channel_url.rfind('/')+1] if '/' in channel_url else channel_url
                        for ts_file in ts_files[:2]:  # 取前2个TS文件
                            if ts_file.startswith('http'):
                                test_urls.append(ts_file)
                            else:
                                test_urls.append(urljoin(base_url, ts_file))
                    
                    elif m3u8_files:
                        # 如果是嵌套的m3u8，使用嵌套的m3u8
                        base_url = channel_url[:channel_url.rfind('/')+1] if '/' in channel_url else channel_url
                        for m3u8_file in m3u8_files[:1]:  # 只取第一个嵌套m3u8
                            if m3u8_file.startswith('http'):
                                test_urls.append(m3u8_file)
                            else:
                                test_urls.append(urljoin(base_url, m3u8_file))
                    
                    else:
                        # 如果没有TS文件，直接测试m3u8文件
                        test_urls = [channel_url]
                    
                    # 对每个测试URL进行测速，取最佳速度
                    for test_url in test_urls:
                        try:
                            start_time = time.time()
                            
                            # 测试下载速度
                            response = requests.get(test_url, timeout=8, headers=HEADERS, verify=False, stream=True)
                            if response.status_code != 200:
                                continue
                            
                            # 读取部分内容
                            downloaded = 0
                            chunk_size = 1024 * 1024  # 1MB
                            max_download = 1024 * 1024 * 2  # 最多下载2MB
                            
                            for chunk in response.iter_content(chunk_size=chunk_size):
                                if chunk:
                                    downloaded += len(chunk)
                                    if downloaded >= max_download:
                                        break
                            
                            elapsed = time.time() - start_time
                            if elapsed > 0 and downloaded > 0:
                                speed = downloaded / elapsed / 1024 / 1024  # MB/s
                                if speed > best_speed:
                                    best_speed = speed
                                
                                # 如果速度足够高，提前返回
                                if speed > 0.5:
                                    return speed
                        except:
                            continue
                    
                    # 如果找到有效的速度，提前结束重试
                    if best_speed > 0:
                        return best_speed
                        
                except Exception as e:
                    continue
            
            return best_speed
        
        def test_stream_speed(channel_url, timeout=10):
            """
            测试流媒体速度的通用方法
            返回速度(MB/s)
            """
            best_speed = 0.0
            
            # 方法1: 如果是m3u8文件，使用专门的方法
            if '.m3u8' in channel_url:
                return test_m3u8_playlist(channel_url, timeout)
            
            # 方法2: 普通HTTP测速
            try:
                start_time = time.time()
                response = requests.get(channel_url, timeout=5, headers=HEADERS, verify=False, stream=True)
                
                if response.status_code == 200:
                    downloaded = 0
                    chunk_size = 1024 * 1024  # 1MB
                    max_download = 1024 * 1024 * 1  # 最多下载1MB
                    
                    for chunk in response.iter_content(chunk_size=chunk_size):
                        if chunk:
                            downloaded += len(chunk)
                            if downloaded >= max_download:
                                break
                    
                    elapsed = time.time() - start_time
                    if elapsed > 0 and downloaded > 0:
                        speed = downloaded / elapsed / 1024 / 1024  # MB/s
                        return speed
            except:
                pass
            
            return 0.0
        
        def test_ip_channels(ip_port, channels):
            """
            测试IP端口下的多个频道，返回最佳速度
            """
            if not channels:
                return 0.0
            
            # 过滤包含"CCTV"的频道
            cctv_channels = [(name, url) for name, url in channels if "CCTV" in name.upper()]
            
            if not cctv_channels:
                # 如果没有CCTV频道，使用所有频道
                cctv_channels = channels
            
            # 随机选择最多3个频道进行测试
            test_count = min(3, len(cctv_channels))
            test_channels = random.sample(cctv_channels, test_count) if len(cctv_channels) > 1 else cctv_channels
            
            best_speed = 0.0
            
            for channel_name, channel_url in test_channels:
                try:
                    speed = test_stream_speed(channel_url)
                    
                    if speed > best_speed:
                        best_speed = speed
                    
                    # 如果速度已经很高，可以提前结束
                    if speed > 1.0:  # 1MB/s
                        break
                except Exception as e:
                    continue
            
            return best_speed
        
        def hotel__ip_port_from_urls(url_list):
            """
            从给定的URL列表中读取直播源文件，提取包含"tsfile"或"hls"的IP和端口
            然后检测IP端口有效性，解析频道，测速，最终保存有效的IP端口
            """
            ip_port_set = set()  # 使用集合自动去重
            
            print("步骤1: 从直播源URL提取IP和端口...")
            for url in url_list:
                try:
                    response = requests.get(url, timeout=15, headers=HEADERS, verify=False)
                    response.raise_for_status()
                    lines = response.text.splitlines()
                    
                    for line in lines:
                        line = line.strip()
                        if not line or line.startswith('#') or ',' not in line:
                            continue
                        
                        parts = line.split(',', 1)
                        if len(parts) < 2:
                            continue
                        
                        url_part = parts[1].strip()
                        if 'tsfile' in url_part or 'hls' in url_part or 'm3u8' in url_part:
                            # 提取IP和端口
                            match = re.search(r'https?://([^:/]+):(\d+)', url_part)
                            if match:
                                ip = match.group(1)
                                port = match.group(2)
                                ip_port_set.add(f"{ip}:{port}")
                    
                    print(f"  从 {url} 提取完成")
                    
                except Exception as e:
                    print(f"处理URL {url} 时发生错误: {e}")
            
            print(f"共提取到 {len(ip_port_set)} 个IP:端口")
            
            # 转换为列表
            ip_port_list = list(ip_port_set)
            
            print(f"\\n步骤2: 检测IP端口有效性...")
            available_ips = []
            
            # 使用线程池并发检测
            with ThreadPoolExecutor(max_workers=20) as executor:
                future_to_ip = {executor.submit(check_ip_availability, ip_port): ip_port for ip_port in ip_port_list}
                
                for future in as_completed(future_to_ip):
                    ip_port = future_to_ip[future]
                    try:
                        is_available, interface_url = future.result()
                        if is_available:
                            available_ips.append((ip_port, interface_url))
                            print(f"  ✓ {ip_port} 可用 (接口: {interface_url})")
                        else:
                            print(f"  ✗ {ip_port} 不可用")
                    except Exception as e:
                        print(f"检测 {ip_port} 时出错: {e}")
            
            print(f"\\n共 {len(available_ips)} 个IP:端口可用")
            
            # 如果没有可用的IP，使用所有IP
            if not available_ips:
                print("警告: 没有找到可用的IP端口，将使用所有提取的IP端口")
                for ip_port in ip_port_list:
                    available_ips.append((ip_port, f"http://{ip_port}/iptv/live/1000.json?key=txiptv"))
                print(f"将使用所有 {len(available_ips)} 个IP端口进行测试")
            
            print(f"\\n步骤3: 从可用IP解析频道信息并测速...")
            ip_speed_results = []
            
            for idx, (ip_port, interface_url) in enumerate(available_ips, 1):
                try:
                    print(f"  [{idx}/{len(available_ips)}] 处理 {ip_port}...")
                    
                    # 解析频道
                    channels = hotel__channels_from_ip_port(ip_port, interface_url)
                    
                    if not channels:
                        # 尝试备用接口
                        if "iptv" in interface_url:
                            alt_url = f"http://{ip_port}/ZHGXTV/Public/json/live_interface.txt"
                        else:
                            alt_url = f"http://{ip_port}/iptv/live/1000.json?key=txiptv"
                        
                        channels = hotel__channels_from_ip_port(ip_port, alt_url)
                    
                    if not channels:
                        print(f"    {ip_port}: 无频道信息")
                        # 仍然保存IP，但标记为未测速
                        ip_speed_results.append((ip_port, 0.0, "无频道信息"))
                        continue
                    
                    print(f"    {ip_port}: 找到 {len(channels)} 个频道")
                    
                    # 测试频道速度
                    best_speed = test_ip_channels(ip_port, channels)
                    
                    if best_speed > 0:
                        ip_speed_results.append((ip_port, best_speed, "测速通过"))
                        print(f"    {ip_port}: 通过测速 (最佳速度: {best_speed:.3f} MB/s)")
                    else:
                        ip_speed_results.append((ip_port, 0.0, "测速失败"))
                        print(f"    {ip_port}: 测速失败")
                        
                except Exception as e:
                    print(f"    {ip_port}: 处理失败 - {e}")
                    ip_speed_results.append((ip_port, 0.0, f"处理失败: {str(e)[:50]}"))
            
            # 按速度排序
            ip_speed_results.sort(key=lambda x: x[1], reverse=True)
            
            print(f"\\n步骤4: 保存IP端口...")
            
            # 保存到文件
            output_dir = "Hotel/ip"
            os.makedirs(output_dir, exist_ok=True)
            output_file = os.path.join(output_dir, "hotel_ip.txt")
            
            with open(output_file, 'w', encoding='utf-8') as f:
                # 先保存通过测速的
                f.write("# 通过测速的IP端口:\\n")
                has_speed = False
                for ip_port, speed, status in ip_speed_results:
                    if speed > 0:
                        has_speed = True
                        speed_kb = speed * 1024
                        f.write(f"{ip_port}  # 速度: {speed:.3f} MB/s ({speed_kb:.1f} KB/s)\\n")
                
                if not has_speed:
                    f.write("# 没有通过测速的IP端口\\n")
                
                # 保存所有IP端口（包括未测速的）
                f.write("\\n# 所有IP端口:\\n")
                for ip_port, speed, status in ip_speed_results:
                    if speed > 0:
                        speed_kb = speed * 1024
                        f.write(f"{ip_port}  # 速度: {speed:.3f} MB/s ({speed_kb:.1f} KB/s)\\n")
                    else:
                        f.write(f"{ip_port}  # {status}\\n")
            
            # 统计信息
            print(f"\\n" + "="*50)
            print(f"处理完成统计:")
            print(f"  - 初始提取IP端口: {len(ip_port_set)} 个")
            print(f"  - 可用IP端口: {len(available_ips)} 个")
            print(f"  - 解析到频道的IP端口: {len([x for x in ip_speed_results if x[2] != '无频道信息'])} 个")
            print(f"  - 通过测速的IP端口: {len([x for x in ip_speed_results if x[1] > 0])} 个")
            print(f"  - 结果已保存到: {output_file}")
            print("="*50)
            
            # 显示通过测速的IP
            speed_ips = [x for x in ip_speed_results if x[1] > 0]
            if speed_ips:
                print(f"\\n通过测速的IP端口 (按速度排序):")
                for i, (ip_port, speed, status) in enumerate(speed_ips[:20], 1):
                    speed_kb = speed * 1024
                    print(f"  {i:2d}. {ip_port} - {speed:.3f} MB/s ({speed_kb:.1f} KB/s)")
                if len(speed_ips) > 20:
                    print(f"  ... 还有 {len(speed_ips)-20} 个")
            else:
                print("\\n警告: 没有找到通过测速的IP端口")
                
            # 显示所有IP
            print(f"\\n所有IP端口状态:")
            for ip_port, speed, status in ip_speed_results[:10]:  # 只显示前10个
                if speed > 0:
                    speed_kb = speed * 1024
                    print(f"  {ip_port} - {speed:.3f} MB/s ({speed_kb:.1f} KB/s)")
                else:
                    print(f"  {ip_port} - {status}")
            if len(ip_speed_results) > 10:
                print(f"  ... 还有 {len(ip_speed_results)-10} 个")
        
        if __name__ == "__main__":
            # 禁用SSL警告
            import urllib3
            urllib3.disable_warnings(urllib3.exceptions.InsecureRequestWarning)
            
            # 示例URL列表
            urls = [
                "https://gh-proxy.com/https://raw.githubusercontent.com/jn950/live/refs/heads/main/tv/holive.m3u",  # txt格式
                "https://gh-proxy.com/https://raw.githubusercontent.com/whyun-pages/hotel-tvn/refs/heads/main/lives.txt",
                "https://gh-proxy.com/https://raw.githubusercontent.com/mzky/checklist/refs/heads/master/itvlist.m3u",
                #"http://129.211.14.102:50085/sub?tv.sohu.blog=txt",
                #"https://gh-proxy.com/https://raw.githubusercontent.com/kenye201/TVlog/refs/heads/main/final_hotel.txt",
            ]
            
            hotel__ip_port_from_urls(urls)
        EOF
        
        python hotel__ip_port.py
      
    - name: Commit and push if changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add Hotel/ip/hotel_ip.txt
        git diff --quiet && git diff --staged --quiet || git commit -m "更新提取 IP and Port $(date '+%Y-%m-%d %H:%M:%S')"
        git push
